<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GQC — 產品配置報價</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">GENMALL<span>.</span></div>
      <div class="sidebar-logo-sub">Quote & Config</div>
    </div>

    <div class="sidebar-nav">
      <div class="sidebar-section-label">Navigation</div>
      <a href="/products.html" class="sidebar-link">
        <span class="sidebar-link-icon">📦</span>產品目錄
      </a>
      <a href="/index.html" class="sidebar-link active">
        <span class="sidebar-link-icon">⚙</span>配置報價
      </a>
      <a href="/quotes.html" class="sidebar-link" id="myQuotesLink" style="display:none">
        <span class="sidebar-link-icon">📄</span>我的報價單
      </a>
      <div id="adminLink" style="display:none">
        <a href="/admin.html" class="sidebar-link">
          <span class="sidebar-link-icon">⚡</span>管理後台
        </a>
      </div>

      <div class="sidebar-section-label" style="padding-top:16px">⚗ 實驗功能</div>
      <label class="theme-switch">
        <span class="sidebar-link-icon" id="themeIcon">🌙</span>
        深色模式
        <input type="checkbox" id="themeToggleInput" onchange="toggleTheme()">
        <span class="theme-switch-track"></span>
      </label>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-user">
      <span id="userName" class="sidebar-username"></span>
      <span id="roleBadge" class="role-badge"></span>
      <button class="sidebar-logout" onclick="logout()">登出</button>
    </div>
  </nav>

  <!-- ── Main Area ── -->
  <div class="main-area">
    <div class="main-topbar">
      <div style="display:flex; align-items:baseline; gap:10px">
        <span class="main-topbar-title">產品選購 / 配置報價</span>
        <span class="main-topbar-sub">Shopping Cart &amp; Quotation</span>
      </div>
      <button id="notifBtn" onclick="toggleNotifPanel()" style="position:relative; background:none; border:none; cursor:pointer; font-size:18px; padding:4px 8px">
        🔔<span id="notifBadge" style="display:none; position:absolute; top:0; right:0; background:#DC3545; color:white; border-radius:50%; width:16px; height:16px; font-size:10px; line-height:16px; text-align:center"></span>
      </button>
    </div>

    <div class="main-content">
      <div id="roleAlert" class="alert" style="display:none; margin-bottom:16px"></div>

      <div class="two-col">

    <!-- 左側：產品選擇 -->
    <div class="card">
      <div class="card-header">產品目錄</div>
      <div class="card-body" id="productList">
        <div class="text-muted">載入中…</div>
      </div>
    </div>

    <!-- 右側：報價摘要 -->
    <div class="summary-sticky">
      <div class="card">
        <div class="card-header">報價摘要</div>
        <div class="card-body">
          <table class="summary-table" id="summaryTable">
            <tbody id="summaryItems">
              <tr><td colspan="2" class="text-muted">尚未選擇產品</td></tr>
            </tbody>
          </table>

          <div class="price-block" id="priceBlock" style="display:none">
            <div id="priceRows"></div>
          </div>

          <div class="mt-16 btn-group" style="flex-direction:column">
            <button class="btn btn-red" onclick="openQuoteModal()" id="btnSubmit" disabled>建立報價單</button>
            <button class="btn btn-outline" onclick="openPreviewModal()" id="btnPreview" disabled>預覽報價單</button>
            <button class="btn btn-outline" onclick="clearCart()" id="btnClearCart" disabled style="color:#DC3545;border-color:#DC3545;margin-top:4px">✕ 全清配置</button>
          </div>
        </div>
      </div>
    </div>

      </div><!-- /two-col -->
    </div><!-- /main-content -->
  </div><!-- /main-area -->
</div><!-- /app-shell -->

<!-- Quote Modal (預覽 + 提交 合一) -->
<div class="modal-overlay" id="quoteModal">
  <div class="modal" style="max-width:860px">
    <div class="modal-header">
      <h3>報價單</h3>
      <button class="modal-close" onclick="closeModal('quoteModal')">✕</button>
    </div>
    <div class="modal-body">

      <!-- 客戶資料表單（不列印）-->
      <div class="no-print" style="background:#F5F5F7;border-radius:8px;padding:16px;margin-bottom:20px">
        <div style="font-weight:600;margin-bottom:12px;font-size:13px;color:#555">客戶資料</div>

        <!-- 客戶搜尋 -->
        <div style="margin-bottom:12px; position:relative">
          <label style="font-size:12px;color:#555;display:block;margin-bottom:4px">
            搜尋現有客戶
            <span id="custSelectedBadge" style="display:none;margin-left:8px;background:#E3F2FD;color:#005FAE;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600"></span>
          </label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="custSearchInput" placeholder="輸入客戶姓名、單位或電話…"
              style="flex:1; max-width:360px"
              oninput="customerSearchInput(this.value)"
              autocomplete="off">
            <button id="custClearBtn" class="btn btn-outline btn-sm" style="display:none;white-space:nowrap" onclick="clearCustomerSelect()">✕ 清除選擇</button>
          </div>
          <div id="custDropdown" style="
            display:none; position:absolute; top:100%; left:0; min-width:360px; max-width:480px;
            background:#FFF; border:1px solid #DDD; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.12);
            z-index:100; max-height:240px; overflow-y:auto; margin-top:2px
          "></div>
        </div>
        <div style="font-size:11px;color:#999;margin-bottom:12px">如搜尋不到，可直接在下方欄位手動填寫</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group" style="margin:0">
            <label>客戶姓名 *</label>
            <input type="text" id="cust_name" placeholder="聯絡人姓名" oninput="renderInvoice()">
          </div>
          <div class="form-group" style="margin:0">
            <label>單位 / 醫院名稱</label>
            <input type="text" id="cust_org" placeholder="台大醫院病理部" oninput="renderInvoice()">
          </div>
          <div class="form-group" style="margin:0">
            <label>聯絡電話</label>
            <input type="tel" id="cust_phone" placeholder="02-1234-5678" oninput="renderInvoice()">
          </div>
          <div class="form-group" style="margin:0">
            <label>電子郵件</label>
            <input type="email" id="cust_email" placeholder="doctor@hospital.com" oninput="renderInvoice()">
          </div>
          <div class="form-group" style="margin:0">
            <label>估價單效期（天）</label>
            <input type="number" id="quote_valid_days" value="30" min="1" max="365" style="width:100px" oninput="renderInvoice()">
          </div>
          <div class="form-group" style="margin:0; grid-column:1/-1">
            <label>案件說明 <span class="text-muted text-small">（提交審核時附上，讓審批人員了解背景）</span></label>
            <textarea id="case_notes" rows="2" placeholder="例：醫院年度採購計畫、競標案、替換舊機型…"></textarea>
          </div>
          <div class="form-group" style="margin:0; grid-column:1/-1">
            <label>自訂備註</label>
            <textarea id="quote_notes" rows="3" placeholder="如有特殊需求或備註事項，請在此填寫…" oninput="renderInvoice()"></textarea>
          </div>
        </div>
      </div>

      <!-- 報價單預覽 -->
      <div id="quotePreviewBody"></div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('quoteModal')">關閉</button>
      <button class="btn btn-outline" onclick="generatePDF()" style="border-color:#555;color:#333">⬇ 儲存 PDF</button>
      <button class="btn btn-red" id="quoteModalSubmitBtn" onclick="submitQuote()">提交報價單</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/configurator.js"></script>
</body>
</html>
