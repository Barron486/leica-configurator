<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leica Biosystems 產品配置選擇器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Principle 14: well-styled product cards — light bg + inset ring */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    /* Principle 1: outer ring instead of border */
    .product-card {
      background: white;
      border-radius: var(--r-md);
      padding: 14px 16px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
      text-decoration: none;
      display: block;
      box-shadow: var(--shadow-xs);
    }
    .product-card:hover:not(.coming-soon) {
      box-shadow: 0 4px 16px rgba(0,95,174,0.14), 0 0 0 1px rgba(0,95,174,0.20);
      transform: translateY(-2px);
    }
    /* Principle 14: coming-soon as well-container */
    .product-card.coming-soon {
      background: var(--well-bg);
      box-shadow: var(--ring-inset);
      cursor: default;
      opacity: 0.70;
    }
    /* Principle 5: tight tracking on product names */
    .product-card .product-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--leica-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .product-card.coming-soon .product-name { color: #999; }
    /* Principle 6: badge as eyebrow mono */
    .product-card .product-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      display: inline-block;
    }
    .badge-available { background: #D1FAE5; color: #065F46; }
    .badge-coming    { background: var(--well-bg); color: #AAA; box-shadow: var(--ring-inset); }

    .section-block { margin-bottom: 0; }

    /* Principle 9 & 10: left-align category inline headings */
    .category-block { margin-bottom: 24px; }
    .category-block:last-child { margin-bottom: 0; }

    .category-label {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 3px;
    }
    .category-label-main {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--leica-dark);
    }
    /* Principle 10: inline English label right side */
    .category-label-en {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #BBB;
    }
    .category-sub {
      font-size: 11.5px;
      color: #888;
      margin-bottom: 10px;
      text-wrap: pretty;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">LEICA<span>.</span></div>
      <div class="sidebar-logo-sub">Biosystems</div>
    </div>

    <div class="sidebar-nav">
      <div class="sidebar-section-label">Navigation</div>
      <a href="/products.html" class="sidebar-link active">
        <span class="sidebar-link-icon">📦</span>產品目錄
      </a>
      <a href="/index.html" class="sidebar-link">
        <span class="sidebar-link-icon">⚙</span>配置報價
      </a>
      <a href="/quotes.html" class="sidebar-link" id="myQuotesLink" style="display:none">
        <span class="sidebar-link-icon">📄</span>我的報價單
      </a>
      <div id="adminLink" style="display:none">
        <a href="/admin.html" class="sidebar-link">
          <span class="sidebar-link-icon">⚡</span>管理後台
        </a>
      </div>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-user">
      <span id="userName" class="sidebar-username"></span>
      <span id="roleBadge" class="role-badge"></span>
      <button class="sidebar-logout" onclick="logout()">登出</button>
    </div>
  </nav>

  <!-- ── Main Area ── -->
  <div class="main-area">
    <div class="main-topbar">
      <div style="display:flex; align-items:baseline; gap:10px">
        <span class="main-topbar-title">產品目錄</span>
        <span class="main-topbar-sub">Product Catalog</span>
      </div>
      <button id="notifBtn" onclick="toggleNotifPanel()" style="position:relative; background:none; border:none; cursor:pointer; font-size:18px; padding:4px 8px">
        🔔<span id="notifBadge" style="display:none; position:absolute; top:0; right:0; background:#DC3545; color:white; border-radius:50%; width:16px; height:16px; font-size:10px; line-height:16px; text-align:center"></span>
      </button>
    </div>

    <div class="main-content">
<div style="margin-bottom:20px">

  <!-- Principle 9: 左對齊 split headline / Principle 10: inline section heading -->
  <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px">
    <div>
      <div class="eyebrow" style="margin-bottom:6px">Select a product to configure</div>
      <h2>選擇產品</h2>
    </div>
    <div style="font-size:12px; color:#AAA; font-style:italic">點選可用產品以進入配置報價</div>
  </div>

  <!-- 動態大類區塊（由 JS 渲染） -->
  <div id="catalog-sections"></div>

</div><!-- /content wrapper -->

    </div><!-- /main-content -->
  </div><!-- /main-area -->
</div><!-- /app-shell -->

<script src="/js/auth.js"></script>
<script>
  const DP_SUBCATEGORY_META = {
    '掃描儀':     { en: 'Whole Slide Imaging', sub: '全玻片數位化掃描，從桌上型到高通量旗艦機' },
    'AI 分析平台': { en: 'AI Platform', sub: '影像管理與 AI 輔助判讀平台' },
    '細胞遺傳學':  { en: 'Cytogenetics', sub: '核型分析與 FISH 自動化系統' },
  };

  (function init() {
    const user = requireAuth();
    if (!user) return;
    document.getElementById('userName').textContent = user.display_name;
    const badge = document.getElementById('roleBadge');
    badge.textContent = ROLE_LABELS[user.role] || user.role;
    badge.className = `role-badge role-${user.role}`;
    if (['admin','super_admin'].includes(user.role)) document.getElementById('adminLink').style.display = 'block';
    if (!['customer','demo'].includes(user.role)) document.getElementById('myQuotesLink').style.display = 'block';
    loadNotifications();
    loadCatalog();
  })();

  async function loadCatalog() {
    const token = localStorage.getItem('token');
    const headers = { 'Authorization': 'Bearer ' + token };
    try {
      const [bomRes, catRes] = await Promise.all([
        fetch('/api/admin/boms/catalog', { headers }),
        fetch('/api/admin/catalog/categories', { headers }),
      ]);
      const boms = bomRes.ok ? await bomRes.json() : [];
      const cats = catRes.ok ? await catRes.json() : [];

      // 建立大類 map：key → { label_zh, label_en, description }
      const catsMap = {};
      cats.forEach(c => { catsMap[c.key] = c; });

      // 依大類 sort_order 排序 BOM
      const catOrder = {};
      cats.forEach((c, i) => { catOrder[c.key] = i; });
      boms.sort((a, b) => (catOrder[a.instrument_category] ?? 99) - (catOrder[b.instrument_category] ?? 99));

      // 渲染各大類
      for (const b of boms) {
        const status = b.active ? 'available' : 'coming_soon';
        const url    = b.active ? `/index.html?bom=${b.id}` : '';
        const catKey = b.instrument_category || '';
        const catInfo = catsMap[catKey] || { label_zh: catKey, label_en: catKey, description: '' };

        if (catKey === 'digital_pathology') {
          renderDpBom(b, status, url, catInfo);
        } else {
          renderGenericBom(b, status, url, catInfo);
        }
      }
    } catch(e) { console.error('loadCatalog error', e); }
  }

  // 數位病理依 subcategory 動態建立分組區塊
  function renderDpBom(b, status, url, catInfo) {
    // 確保 DP 區塊存在
    ensureCatSection('digital_pathology', catInfo);
    const cardBody = document.querySelector('#dp-card-body');

    const sub     = b.subcategory || catInfo.label_zh;
    const safeKey = sub.replace(/\s+/g,'_').replace(/[^\w]/g,'');
    const blockId = 'block-dp-' + safeKey;
    let block = document.getElementById(blockId);
    if (!block) {
      const meta = DP_SUBCATEGORY_META[sub] || { en: b.subcategory || catInfo.label_en || sub, sub: catInfo.description || '' };
      block = document.createElement('div');
      block.className = 'category-block';
      block.id = blockId;
      const labelDiv = document.createElement('div');
      labelDiv.className = 'category-label';
      const nameEl = document.createElement('span');
      nameEl.className = 'category-label-main';
      nameEl.textContent = sub;
      const enEl = document.createElement('span');
      enEl.className = 'category-label-en';
      enEl.textContent = meta.en;
      labelDiv.appendChild(nameEl);
      labelDiv.appendChild(enEl);
      block.appendChild(labelDiv);
      if (meta.sub) {
        const subEl = document.createElement('div');
        subEl.className = 'category-sub';
        subEl.textContent = meta.sub;
        block.appendChild(subEl);
      }
      const gridDiv = document.createElement('div');
      gridDiv.className = 'product-grid';
      gridDiv.id = 'grid-dp-' + safeKey;
      block.appendChild(gridDiv);
      if (cardBody) cardBody.appendChild(block);
    }
    const grid = document.getElementById('grid-dp-' + safeKey);
    if (grid) appendProductCard(grid, b.name, b.short_description, status, url);
  }

  // 通用大類：每個大類建立獨立 section card
  function renderGenericBom(b, status, url, catInfo) {
    ensureCatSection(b.instrument_category, catInfo);
    const gridId = 'grid-' + b.instrument_category;
    const grid = document.getElementById(gridId);
    if (grid) appendProductCard(grid, b.name, b.short_description, status, url);
  }

  // 確保 section card 存在
  function ensureCatSection(catKey, catInfo) {
    if (document.getElementById('section-' + catKey)) return;
    const container = document.getElementById('catalog-sections');
    if (!container) return;

    const sectionBlock = document.createElement('div');
    sectionBlock.className = 'section-block';
    sectionBlock.id = 'section-' + catKey;
    sectionBlock.style.marginBottom = '20px';

    if (catKey === 'digital_pathology') {
      // DP 特殊 card 結構（留 dp-card-body 供 subcategory 動態插入）
      sectionBlock.innerHTML = `
        <div class="card">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <span>🏥</span>
              <span style="font-weight:800;letter-spacing:-0.02em">${catInfo.label_zh}</span>
            </div>
            <span class="eyebrow" style="color:rgba(255,255,255,0.40)">${catInfo.label_en || ''}</span>
          </div>
          <div class="card-body" id="dp-card-body"></div>
        </div>`;
    } else {
      sectionBlock.innerHTML = `
        <div class="card">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <span>🔬</span>
              <span style="font-weight:800;letter-spacing:-0.02em">${catInfo.label_zh}</span>
            </div>
            <span class="eyebrow" style="color:rgba(255,255,255,0.40)">${catInfo.label_en || ''}</span>
          </div>
          <div class="card-body">
            <div class="category-block">
              <div class="category-label">
                <span class="category-label-main">${catInfo.label_zh}</span>
                ${catInfo.label_en ? `<span class="category-label-en">${catInfo.label_en}</span>` : ''}
              </div>
              ${catInfo.description ? `<div class="category-sub">${catInfo.description}</div>` : ''}
              <div class="product-grid" id="grid-${catKey}"></div>
            </div>
          </div>
        </div>`;
    }
    container.appendChild(sectionBlock);
  }

  function appendProductCard(grid, name, shortDesc, status, url) {
    const a = document.createElement('a');
    if (status === 'available') {
      a.className = 'product-card';
      a.href = url || '/index.html';
    } else {
      a.className = 'product-card coming-soon';
    }
    // 名稱永遠在最上方
    const nameEl = document.createElement('div');
    nameEl.className = 'product-name';
    nameEl.textContent = name;
    a.appendChild(nameEl);
    // 描述在名稱下方（反灰）
    if (shortDesc) {
      const desc = document.createElement('div');
      desc.style.cssText = 'font-size:11px;color:#999;margin-top:4px;line-height:1.4';
      desc.textContent = shortDesc;
      a.appendChild(desc);
    }
    // 僅 coming soon 顯示 badge，已啟用不顯示
    if (status !== 'available') {
      const badge = document.createElement('span');
      badge.className = 'product-badge badge-coming';
      badge.textContent = 'Coming Soon';
      badge.style.marginTop = '6px';
      badge.style.display = 'inline-block';
      a.appendChild(badge);
    }
    grid.appendChild(a);
  }
</script>
</body>
</html>
