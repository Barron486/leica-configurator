<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GQC — 產品目錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/style.css?v=4">
  <style>
    /* Principle 14: well-styled product cards — light bg + inset ring */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    /* Principle 1: outer ring instead of border */
    .product-card {
      background: white;
      border-radius: var(--r-md);
      padding: 14px 16px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
      text-decoration: none;
      display: block;
      box-shadow: var(--shadow-xs);
    }
    .product-card:hover:not(.coming-soon) {
      box-shadow: 0 4px 16px rgba(0,95,174,0.14), 0 0 0 1px rgba(0,95,174,0.20);
      transform: translateY(-2px);
    }
    /* Principle 14: coming-soon as well-container */
    .product-card.coming-soon {
      background: var(--well-bg);
      box-shadow: var(--ring-inset);
      cursor: default;
      opacity: 0.70;
    }
    /* Principle 5: tight tracking on product names */
    .product-card .product-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--leica-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .product-card.coming-soon .product-name { color: #999; }
    /* Principle 6: badge as eyebrow mono */
    .product-card .product-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      display: inline-block;
    }
    .badge-available { background: #D1FAE5; color: #065F46; }
    .badge-coming    { background: var(--well-bg); color: #AAA; box-shadow: var(--ring-inset); }

    .section-block { margin-bottom: 0; }

    /* Principle 9 & 10: left-align category inline headings */
    .category-block { margin-bottom: 24px; }
    .category-block:last-child { margin-bottom: 0; }

    .category-label {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 3px;
    }
    .category-label-main {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--leica-dark);
    }
    /* Principle 10: inline English label right side */
    .category-label-en {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: #BBB;
    }
    .category-sub {
      font-size: 11.5px;
      color: #888;
      margin-bottom: 10px;
      text-wrap: pretty;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div>
        <div class="sidebar-logo">GENMALL<span>.</span></div>
        <div class="sidebar-logo-sub">Quote & Config</div>
      </div>
      <button class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()" title="折疊側邊欄">&#9664;</button>
    </div>

    <div class="sidebar-nav">
      <div class="sidebar-section-label">Navigation</div>
      <a href="/products.html" class="sidebar-link active">
        <span class="sidebar-link-icon">📦</span><span class="sidebar-link-text">產品目錄</span>
      </a>
      <a href="/index.html" class="sidebar-link" id="configLink">
        <span class="sidebar-link-icon">⚙</span><span class="sidebar-link-text">配置報價</span>
        <span id="cartBadge" style="display:none;margin-left:auto;background:#E3001B;color:white;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;min-width:18px;text-align:center">0</span>
      </a>
      <a href="/quotes.html" class="sidebar-link" id="myQuotesLink" style="display:none">
        <span class="sidebar-link-icon">📄</span><span class="sidebar-link-text">我的報價單</span>
      </a>
      <div id="adminLink" style="display:none">
        <a href="/admin.html" class="sidebar-link">
          <span class="sidebar-link-icon">⚡</span><span class="sidebar-link-text">管理後台</span>
        </a>
      </div>

      <div class="sidebar-section-label" style="padding-top:16px">⚗ 實驗功能</div>
      <button type="button" class="sidebar-link theme-switch" onclick="toggleTheme()">
        <span class="sidebar-link-icon" id="themeIcon">🌙</span>
        <span class="sidebar-link-text">深色模式</span>
        <span class="theme-switch-track"><span class="theme-switch-thumb"></span></span>
      </button>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-user">
      <span id="userName" class="sidebar-username"></span>
      <span id="roleBadge" class="role-badge"></span>
      <button class="sidebar-logout" onclick="logout()">登出</button>
    </div>
  </nav>

  <!-- ── Main Area ── -->
  <div class="main-area">
    <div class="main-topbar">
      <div style="display:flex; align-items:baseline; gap:10px">
        <span class="main-topbar-title">產品目錄</span>
        <span class="main-topbar-sub">Product Catalog</span>
      </div>
      <button id="notifBtn" onclick="toggleNotifPanel()" style="position:relative; background:none; border:none; cursor:pointer; font-size:18px; padding:4px 8px">
        🔔<span id="notifBadge" style="display:none; position:absolute; top:0; right:0; background:#DC3545; color:white; border-radius:50%; width:16px; height:16px; font-size:10px; line-height:16px; text-align:center"></span>
      </button>
    </div>

    <div class="main-content">
<div style="margin-bottom:20px">

  <!-- Principle 9: 左對齊 split headline / Principle 10: inline section heading -->
  <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px">
    <div>
      <div class="eyebrow" style="margin-bottom:6px">Select a product to configure</div>
      <h2>選擇產品</h2>
    </div>
    <div style="font-size:12px; color:#AAA; font-style:italic">點選可用產品查看詳情並加入購物車</div>
  </div>

  <!-- 動態大類區塊（由 JS 渲染） -->
  <div id="catalog-sections"></div>

</div><!-- /content wrapper -->

    </div><!-- /main-content -->
  </div><!-- /main-area -->
</div><!-- /app-shell -->

<!-- BOM Detail Modal -->
<div id="bomDetailModal" class="modal-overlay">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h3 id="bomDetailName">產品詳情</h3>
      <button class="modal-close" onclick="document.getElementById('bomDetailModal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body">
      <p id="bomDetailDesc" class="product-desc" style="margin-bottom:16px"></p>
      <div style="font-size:11px;font-weight:700;color:#E3001B;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">配置品項清單</div>
      <table class="data-table" style="margin:0">
        <thead>
          <tr>
            <th>品名 / 說明</th>
            <th>料號</th>
            <th style="text-align:center">數量</th>
          </tr>
        </thead>
        <tbody id="bomDetailItems">
          <tr><td colspan="3" style="color:#AAA">載入中…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('bomDetailModal').classList.remove('open')">關閉</button>
      <button class="btn btn-red" id="bomDetailBtn">加入購物車</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script>
  const DP_SUBCATEGORY_META = {
    '掃描儀':     { en: 'Whole Slide Imaging', sub: '全玻片數位化掃描，從桌上型到高通量旗艦機' },
    'AI 分析平台': { en: 'AI Platform', sub: '影像管理與 AI 輔助判讀平台' },
    '細胞遺傳學':  { en: 'Cytogenetics', sub: '核型分析與 FISH 自動化系統' },
  };

  (function init() {
    const user = requireAuth();
    if (!user) return;
    document.getElementById('userName').textContent = user.display_name;
    const badge = document.getElementById('roleBadge');
    badge.textContent = ROLE_LABELS[user.role] || user.role;
    badge.className = `role-badge role-${user.role}`;
    if (['admin','super_admin'].includes(user.role)) document.getElementById('adminLink').style.display = 'block';
    if (!['customer','demo'].includes(user.role)) document.getElementById('myQuotesLink').style.display = 'block';
    loadNotifications();
    updateCartBadge();
    loadCatalog();
  })();

  async function loadCatalog() {
    const token = localStorage.getItem('token');
    const headers = { 'Authorization': 'Bearer ' + token };
    try {
      const [bomRes, catRes] = await Promise.all([
        fetch('/api/admin/boms/catalog', { headers }),
        fetch('/api/admin/catalog/categories', { headers }),
      ]);
      const boms = bomRes.ok ? await bomRes.json() : [];
      const cats = catRes.ok ? await catRes.json() : [];

      // 建立大類 map：key → { label_zh, label_en, description }
      const catsMap = {};
      cats.forEach(c => { catsMap[c.key] = c; });

      // 依大類 sort_order 排序 BOM
      const catOrder = {};
      cats.forEach((c, i) => { catOrder[c.key] = i; });
      boms.sort((a, b) => (catOrder[a.instrument_category] ?? 99) - (catOrder[b.instrument_category] ?? 99));

      // 渲染各大類
      for (const b of boms) {
        const status = b.active ? 'available' : 'coming_soon';
        const url    = b.active ? `/index.html?bom=${b.id}` : '';
        const catKey = b.instrument_category || '';
        const catInfo = catsMap[catKey] || { label_zh: catKey, label_en: catKey, description: '' };

        if (catKey === 'digital_pathology') {
          renderDpBom(b, status, url, catInfo);
        } else {
          renderGenericBom(b, status, url, catInfo);
        }
      }
    } catch(e) { console.error('loadCatalog error', e); }
  }

  // 數位病理依 subcategory 動態建立分組區塊
  function renderDpBom(b, status, url, catInfo) {
    // 確保 DP 區塊存在
    ensureCatSection('digital_pathology', catInfo);
    const cardBody = document.querySelector('#dp-card-body');

    const sub     = b.subcategory || catInfo.label_zh;
    const safeKey = sub.replace(/\s+/g,'_').replace(/[^\w]/g,'');
    const blockId = 'block-dp-' + safeKey;
    let block = document.getElementById(blockId);
    if (!block) {
      const meta = DP_SUBCATEGORY_META[sub] || { en: b.subcategory || catInfo.label_en || sub, sub: catInfo.description || '' };
      block = document.createElement('div');
      block.className = 'category-block';
      block.id = blockId;
      const labelDiv = document.createElement('div');
      labelDiv.className = 'category-label';
      const nameEl = document.createElement('span');
      nameEl.className = 'category-label-main';
      nameEl.textContent = sub;
      const enEl = document.createElement('span');
      enEl.className = 'category-label-en';
      enEl.textContent = meta.en;
      labelDiv.appendChild(nameEl);
      labelDiv.appendChild(enEl);
      block.appendChild(labelDiv);
      if (meta.sub) {
        const subEl = document.createElement('div');
        subEl.className = 'category-sub';
        subEl.textContent = meta.sub;
        block.appendChild(subEl);
      }
      const gridDiv = document.createElement('div');
      gridDiv.className = 'product-grid';
      gridDiv.id = 'grid-dp-' + safeKey;
      block.appendChild(gridDiv);
      if (cardBody) cardBody.appendChild(block);
    }
    const grid = document.getElementById('grid-dp-' + safeKey);
    if (grid) appendProductCard(grid, b.name, b.short_description, status, url, b.id);
  }

  // 通用大類：每個大類建立獨立 section card
  function renderGenericBom(b, status, url, catInfo) {
    ensureCatSection(b.instrument_category, catInfo);
    const gridId = 'grid-' + b.instrument_category;
    const grid = document.getElementById(gridId);
    if (grid) appendProductCard(grid, b.name, b.short_description, status, url, b.id);
  }

  // 確保 section card 存在
  function ensureCatSection(catKey, catInfo) {
    if (document.getElementById('section-' + catKey)) return;
    const container = document.getElementById('catalog-sections');
    if (!container) return;

    const sectionBlock = document.createElement('div');
    sectionBlock.className = 'section-block';
    sectionBlock.id = 'section-' + catKey;
    sectionBlock.style.marginBottom = '20px';

    if (catKey === 'digital_pathology') {
      // DP 特殊 card 結構（留 dp-card-body 供 subcategory 動態插入）
      sectionBlock.innerHTML = `
        <div class="card">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <span>🏥</span>
              <span style="font-weight:800;letter-spacing:-0.02em">${catInfo.label_zh}</span>
            </div>
            <span class="eyebrow" style="color:rgba(255,255,255,0.40)">${catInfo.label_en || ''}</span>
          </div>
          <div class="card-body" id="dp-card-body"></div>
        </div>`;
    } else {
      sectionBlock.innerHTML = `
        <div class="card">
          <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
            <div style="display:flex;align-items:center;gap:8px">
              <span>🔬</span>
              <span style="font-weight:800;letter-spacing:-0.02em">${catInfo.label_zh}</span>
            </div>
            <span class="eyebrow" style="color:rgba(255,255,255,0.40)">${catInfo.label_en || ''}</span>
          </div>
          <div class="card-body">
            <div class="category-block">
              <div class="category-label">
                <span class="category-label-main">${catInfo.label_zh}</span>
                ${catInfo.label_en ? `<span class="category-label-en">${catInfo.label_en}</span>` : ''}
              </div>
              ${catInfo.description ? `<div class="category-sub">${catInfo.description}</div>` : ''}
              <div class="product-grid" id="grid-${catKey}"></div>
            </div>
          </div>
        </div>`;
    }
    container.appendChild(sectionBlock);
  }

  // bomId → { name, short_description, url } for modal use
  const _bomMeta = {};

  function appendProductCard(grid, name, shortDesc, status, url, bomId) {
    if (bomId) _bomMeta[bomId] = { name, short_description: shortDesc, url };
    const a = document.createElement('a');
    a.className = status === 'available' ? 'product-card' : 'product-card coming-soon';
    if (status === 'available' && bomId) {
      a.href = '#';
      a.onclick = (e) => { e.preventDefault(); openBomModal(bomId); };
    }

    const nameEl = document.createElement('div');
    nameEl.className = 'product-name';
    nameEl.textContent = name;
    a.appendChild(nameEl);

    if (shortDesc) {
      const desc = document.createElement('div');
      desc.style.cssText = 'font-size:11px;color:#999;margin-top:4px;line-height:1.4';
      desc.textContent = shortDesc;
      a.appendChild(desc);
    }
    if (status !== 'available') {
      const badge = document.createElement('span');
      badge.className = 'product-badge badge-coming';
      badge.textContent = 'Coming Soon';
      badge.style.marginTop = '6px';
      badge.style.display = 'inline-block';
      a.appendChild(badge);
    } else {
      const hint = document.createElement('div');
      hint.style.cssText = 'font-size:10px;color:#005FAE;margin-top:8px;font-weight:600';
      hint.textContent = '查看詳情 →';
      a.appendChild(hint);
    }
    grid.appendChild(a);
  }

  async function openBomModal(bomId) {
    const meta = _bomMeta[bomId] || {};
    const modal = document.getElementById('bomDetailModal');
    document.getElementById('bomDetailName').textContent = meta.name || '';
    document.getElementById('bomDetailDesc').textContent = meta.short_description || '';
    document.getElementById('bomDetailItems').innerHTML = '<tr><td colspan="3" style="color:#AAA;padding:12px">載入中…</td></tr>';
    document.getElementById('bomDetailBtn').onclick = () => { addBomToCart(bomId, meta.name || ''); };
    modal.classList.add('open');

    const token = localStorage.getItem('token');
    const res = await fetch(`/api/admin/boms/${bomId}/config`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) {
      document.getElementById('bomDetailItems').innerHTML = '<tr><td colspan="3" style="color:#DC3545;padding:12px">載入失敗</td></tr>';
      return;
    }
    const { items } = await res.json();
    const catLabels = typeof CATEGORY_LABELS !== 'undefined' ? CATEGORY_LABELS : {};
    document.getElementById('bomDetailItems').innerHTML = items.length
      ? items.map(it => `
        <tr>
          <td style="padding:8px 10px">
            <div style="font-size:13px;font-weight:600">${escHtml(it.name_zh||'')}</div>
            ${it.description ? `<div class="product-desc" style="font-size:11px;margin-top:3px;line-height:1.5">${escHtml(it.description)}</div>` : ''}
          </td>
          <td style="padding:8px 10px;font-size:11px;font-family:monospace;white-space:nowrap" class="text-muted">${escHtml(it.catalog_number||'')}</td>
          <td style="padding:8px 10px;font-size:12px;text-align:center;white-space:nowrap" class="text-muted">×${it.quantity}</td>
        </tr>`).join('')
      : '<tr><td colspan="3" style="color:#AAA;padding:12px">此 BOM 尚無品項</td></tr>';
  }

  // ── 購物車功能 ─────────────────────────────────────────────
  function addBomToCart(bomId, bomName) {
    const cart = JSON.parse(localStorage.getItem('gqc_cart') || '[]');
    const existing = cart.find(x => x.bomId === bomId);
    if (!existing) {
      cart.push({ bomId, bomName });
      localStorage.setItem('gqc_cart', JSON.stringify(cart));
    }
    document.getElementById('bomDetailModal').classList.remove('open');
    updateCartBadge();
    showToast(bomName ? bomName + ' 已加入購物車！可前往配置報價查看' : '已加入購物車！', 'success');
  }

  function updateCartBadge() {
    const cart = JSON.parse(localStorage.getItem('gqc_cart') || '[]');
    const badge = document.getElementById('cartBadge');
    if (!badge) return;
    if (cart.length > 0) {
      badge.textContent = cart.length;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
